# 限流規則：以來源 IP 為單位，10 r/s，10MB 狀態記憶體（約可追蹤 16 萬個 IP）
limit_req_zone $binary_remote_addr zone=per_ip_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    location / {
        # burst=20：允許超出 rate 的請求最多突發 20 個
        # nodelay：突發請求立即處理，不排隊；超過 burst 才拒絕
        # limit_req_status 429：超限回傳 429（預設是 503）
        limit_req zone=per_ip_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://web:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}