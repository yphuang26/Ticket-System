services:
  web:
    image: python:3.10-slim
    volumes:
      - .:/code
    working_dir: /code
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
  worker:
    image: python:3.10-slim
    volumes:
      - .:/code
    working_dir: /code
    command: sh -c "pip install -r requirements.txt && python app/worker.py"
    depends_on:
      - redis
      - db
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_DB=ticket_db
    ports:
      - "5432:5432"
  k6:
    image: grafana/k6:latest
    volumes:
      - .:/code
    depends_on:
      - web