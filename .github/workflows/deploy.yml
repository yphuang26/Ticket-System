name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/.ssh
            grep -q "github.com" ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            REPO_DIR=~/Ticket-System
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone git@github.com:yphuang26/Ticket-System.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git pull origin main
            docker compose up -d --build